<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/resume-layout :: layout(~{::section})}">
<section th:fragment="section">
    <div th:replace="~{fragments/resume-form :: sectionHeader('05', '資格・免許', '取得済みの資格・免許・認定資格を登録してください')}"></div>

    <div class="cert-card">
        <div class="card-top">
            <span class="entry-badge">資格 01</span>
            <button type="button" class="btn-icon" style="display: flex; align-items: center; gap: 0.25rem; font-size: 0.75rem;">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                削除
            </button>
        </div>
        <div class="form-grid form-grid-2">
            <div class="field col-span-2">
                <label class="field-label">資格・免許名<span class="required">必須</span></label>
                <input class="input" type="text" name="cert[0].name" placeholder="AWS認定ソリューションアーキテクト - アソシエイト">
            </div>
            <div class="field">
                <label class="field-label">発行機関・認定機関</label>
                <input class="input" type="text" name="cert[0].issuer" placeholder="Amazon Web Services">
            </div>
            <div class="field">
                <label class="field-label">取得年月<span class="required">必須</span></label>
                <div class="period-group">
                    <select class="select" name="cert[0].year">
                        <option value="">年</option>
                        <option th:each="y : ${years}" th:value="${y}" th:text="${y} + '年'">2024年</option>
                    </select>
                    <select class="select" name="cert[0].month">
                        <option value="">月</option>
                        <option th:each="m : ${months}" th:value="${m}" th:text="${m} + '月'">01月</option>
                    </select>
                </div>
            </div>
        </div>
        <div style="margin-top: 1rem;">
            <label class="checkbox-label">
                <input type="checkbox" name="cert[0].hasExpiry">
                有効期限がある
            </label>
            <div class="field" style="margin-top: 0.75rem;">
                <label class="field-label">有効期限</label>
                <div class="period-group">
                    <select class="select" name="cert[0].expiryYear">
                        <option value="">年</option>
                        <option th:each="y : ${#numbers.sequence(2024, 2043)}" th:value="${y}" th:text="${y} + '年'">2026年</option>
                    </select>
                    <select class="select" name="cert[0].expiryMonth">
                        <option value="">月</option>
                        <option th:each="m : ${months}" th:value="${m}" th:text="${m} + '月'">01月</option>
                    </select>
                </div>
            </div>
        </div>
    </div>

    <button type="button" class="btn-dashed" style="margin-bottom: 1.25rem;">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        資格を追加する
    </button>

    <div>
        <p style="font-size: 0.75rem; color: var(--muted-foreground); margin: 0 0 0.5rem;">よく登録される資格</p>
        <div class="suggested-skills">
            <button type="button" class="btn-chip">+ 基本情報技術者試験</button>
            <button type="button" class="btn-chip">+ 応用情報技術者試験</button>
            <button type="button" class="btn-chip">+ AWS認定ソリューションアーキテクト</button>
            <button type="button" class="btn-chip">+ Google Cloud Professional</button>
            <button type="button" class="btn-chip">+ TOEIC</button>
            <button type="button" class="btn-chip">+ PMP</button>
            <button type="button" class="btn-chip">+ 情報処理安全確保支援士</button>
        </div>
    </div>
</section>
</html>
